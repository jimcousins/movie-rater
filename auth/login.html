<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="auth.css">

    <title>App Name — Log In</title>
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 420px;">

        <div class="mb-4 text-center">
            <h1 class="h3">App Name</h1>
            <p class="text-muted">Welcome back — log in to continue</p>
        </div>

        <div class="alert alert-success d-none" id="successBanner"></div>

        <div id="loginForm">

            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="jane@example.com" />
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Your password" />
            </div>

            <div id="securitySection" class="d-none mb-3">
                <p class="fw-semibold text-muted small text-uppercase">Security verification</p>
                <div class="mb-3">
                    <p id="questionText" class="mb-2"></p>
                    <input type="text" class="form-control" id="secAnswer" placeholder="Your answer" />
                    <div class="form-text">Not case-sensitive</div>
                </div>
            </div>

            <button class="btn btn-dark w-100 mb-3" id="loginBtn">Continue</button>

            <p class="text-center text-muted small">
                New to App Name? <a href="signup.html">Create an account</a>
            </p>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
