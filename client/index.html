<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="assets/style.css">

  <title>Movie Rater</title>
</head>

<body>

<!-- NAVBAR  -->
<nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="container-fluid">

    <div class="d-flex align-items-center gap-4">
      <i class="bi bi-camera-reels-fill logo-icon"></i>

      <div class="nav-links d-flex gap-3">
        <a href="index.html" class="nav-link-custom active">Home</a>
        <a href="list.html" class="nav-link-custom">My Movies</a>
        <a href="add.html" class="nav-link-custom">Add Movie</a>
      </div>
    </div>

    <!-- RIGHT: Search + Theme + Account -->
    <div class="d-flex align-items-center gap-3 ms-auto">

      <!-- <input
        type="text"
        class="form-control search-bar"
        placeholder="Search for a movie..."
      > -->

      <!-- Theme dropdown -->
      <div class="dropdown">
        <button class="btn account-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
          Theme
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><button class="dropdown-item" onclick="setTheme('light')">Light</button></li>
          <li><button class="dropdown-item" onclick="setTheme('dark')">Blue</button></li>
          <li><button class="dropdown-item" onclick="setTheme('orange')">Orange</button></li>
          <li><button class="dropdown-item" onclick="setTheme('pink')">Pink</button></li>
        </ul>
      </div>

      <button class="btn account-btn">Account</button>

    </div>

  </div>
</nav>


<!-- HERO SECTION -->
<section class="hero-section d-flex align-items-center justify-content-center text-center">

  <div class="hero-overlay"></div>

  <div class="container hero-content">
    <h1 class="hero-title">
      Track Every Movie.<br>
      Discover Every Rating.
    </h1>

    <p class="hero-subtitle">
      Keep track of what you've watched, explore ratings, and build your personal movie collection.
    </p>

    <a href="list.html" class="btn start-btn mt-3">
      Start Logging Movies
    </a>
  </div>

</section>

<script>
  function setTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
  }

  const savedTheme = localStorage.getItem('theme') || 'light';
  document.body.setAttribute('data-theme', savedTheme);
</script>

</body>
</html>
