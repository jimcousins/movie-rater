<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/style.css">

  <title>Movie Rater</title>
</head>

<body>

<!-- ✅ NAVBAR (same as list.html) -->
<nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="container-fluid">

    <div class="d-flex align-items-center gap-4">
      <i class="bi bi-camera-reels-fill logo-icon"></i>

      <div class="nav-links d-flex gap-3">
        <a href="index.html" class="nav-link-custom active">Home</a>
        <a href="list.html" class="nav-link-custom">My Movies</a>
        <a href="add.html" class="nav-link-custom">Add Movie</a>
      </div>
    </div>

    <div class="d-flex align-items-center gap-3 ms-auto">

  <div class="hero-overlay"></div>

      Track Every Movie.<br>
      Discover Every Rating.

    </p>

    <a href="list.html" class="btn start-btn mt-3">
