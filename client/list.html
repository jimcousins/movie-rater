<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/list.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/style.css">
    <title>My film list</title>
</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="container-fluid">

    <!-- LEFT: Logo + Nav links -->
    <div class="d-flex align-items-center gap-4">
      <i class="bi bi-camera-reels-fill logo-icon"></i>

      <div class="nav-links d-flex gap-3">
        <a href="index.html" class="nav-link-custom">Home</a>
        <a href="list.html" class="nav-link-custom active">My Movies</a>
        <a href="add.html" class="nav-link-custom">Add Movie</a>
      </div>
    </div>

    <!-- RIGHT: Search + Theme + Account -->
    <div class="d-flex align-items-center gap-3 ms-auto">

      <input
        type="text"
        class="form-control search-bar"
      <!-- <input 
        type="text" 
        class="form-control search-bar" 
        placeholder="Search for a movie..."
      > -->

      <!-- Theme dropdown -->
      <div class="dropdown">
        <button class="btn account-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
          Theme 
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><button class="dropdown-item" onclick="setTheme('light')">Light</button></li>
          <li><button class="dropdown-item" onclick="setTheme('dark')">Dark</button></li>
          <li><button class="dropdown-item" onclick="setTheme('orange')">Orange</button></li>
          <li><button class="dropdown-item" onclick="setTheme('pink')">Pink</button></li>
        </ul>
      </div>

      <button class="btn account-btn">Account</button>

    </div>

  </div>
</nav>

    <h1 class="text-center p-2">Movie Rater</h1>

    <h3 class="text-center">Add Movie</h3>

    <form class="m-3" id="movie-form">
        <div class="mb-3">
            <label for="movieName" class="form-label">Movie name</label>
            <input type="text" class="form-control" id="movieName" placeholder="e.g. Star Wars">
        </div>
        <div class="mb-3">
            <label for="movieRating" class="form-label">Your rating out of 10</label>
            <input type="number" class="form-control" id="movieRating" min="0" max="10" step="0.5" placeholder="e.g. 8.5">
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <h3 class="text-center my-2">Movies watched</h3>
    <div id="movie-list" class="row row-cols-1 row-cols-md-2 g-4 mx-3">
    </div>

<script>
  function setTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
  }

  const savedTheme = localStorage.getItem('theme') || 'light';
  document.body.setAttribute('data-theme', savedTheme);
</script>

</body>
</html>
