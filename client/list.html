<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/list.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/style.css">
    <title>My Song List</title>
</head>
<body>


<nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="container-fluid d-flex align-items-center justify-content-between">

    <!-- LEFT -->
    <div class="d-flex align-items-center gap-4">
      <img src="./assets/images/HearHearLogo.png" class="logo-img"  alt="HearHear logo">

      <div class="nav-links d-flex gap-3">
        <a href="index.html" class="nav-link-custom">Home</a>
        <a href="list.html" class="nav-link-custom active">My Songs</a>
        <a href="add.html" class="nav-link-custom">Add Song</a>
      </div>
    </div>

    <!-- CENTER (NEW) -->
    <div class="navbar-center">
      <img src="https://hearhear.amsterdam/assets/img/hearhear_LOGO.svg?v2" class="brand-text" width="90px" alt="HearHear">
    </div>

    <!-- RIGHT -->
    <div class="d-flex align-items-center gap-3">
      <div class="dropdown">
        <button class="btn account-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
          Theme 
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><button class="dropdown-item" onclick="setTheme('light')">Light</button></li>
          <li><button class="dropdown-item" onclick="setTheme('dark')">Dark</button></li>
          <li><button class="dropdown-item" onclick="setTheme('orange')">Orange</button></li>
          <li><button class="dropdown-item" onclick="setTheme('pink')">Pink</button></li>
        </ul>
      </div>

      <button class="btn account-btn">Account</button>
    </div>

  </div>
</nav>

<h1 class="text-center p-2">Song Rater AI</h1>

<section class="text-center my-4">
    <h3 class="text-center">Ask AI For A Song</h3>
    <p class="text-muted">Tell us your vibe and get a recommendation.</p>

    <div class="d-flex justify-content-center gap-2 mt-3 px-3">
        <input 
            type="text" 
            id="chat-input" 
            class="form-control" 
            placeholder="e.g. suggest a chill song..."
            style="max-width: 500px;"
        >
        <button class="btn btn-primary" onclick="handleChat()">Ask</button>
    </div>

    <p id="chat-response" class="mt-3 fw-semibold"></p>
</section>

<h3 class="text-center">Add Song</h3>

<form class="m-3" id="movie-form">
    <div class="mb-3">
        <label for="movieName" class="form-label">Song name</label>
        <input type="text" class="form-control" id="movieName" placeholder="e.g. Blinding Lights">
    </div>
    <div class="mb-3">
        <label for="movieRating" class="form-label">Your rating out of 10</label>
        <input type="number" class="form-control" id="movieRating" min="0" max="10" step="0.5" placeholder="e.g. 8.5">
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<h3 class="text-center my-2">Songs Rated</h3>
<div id="movie-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 px-3">
</div>

</body>
</html>
